<div class="relative" clickOutside (clickOutside)="close()">
    <!-- Trigger Button -->
    <button class="bg-white/10 hover:bg-white/20 px-2 py-1.5 rounded-lg flex items-center gap-2.5 transition-colors border border-white/10 shadow-sm" (click)="toggle()">
        <!-- Avatar -->
        <span class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-white text-sm font-semibold ring-2 ring-white/20 shadow-sm flex-shrink-0" *ngIf="!user()?.avatar">
            {{ initials() }}
        </span>
        <img *ngIf="user()?.avatar" class="w-8 h-8 rounded-full ring-2 ring-white/20 object-cover shadow-sm flex-shrink-0" [src]="user()?.avatar" alt="">
        
        <!-- Name (Desktop only) -->
        <span class="hidden md:inline text-sm font-medium text-white/90">
            {{ user()?.name || user()?.email }}
        </span>
        
        <!-- Chevron Core -->
        <svg class="w-4 h-4 text-white/70 ml-1 transition-transform duration-200" [class.rotate-180]="isOpen()" viewBox="0 0 20 20" fill="currentColor">
            <path d="M5.25 7.5l4.5 4.5 4.5-4.5" />
        </svg>
    </button>

    <!-- Dropdown Menu -->
    <div *ngIf="isOpen()" 
         class="absolute right-0 top-full mt-2 w-64 bg-white rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.12)] ring-1 ring-black/5 z-[100] transform opacity-100 scale-100 transition-all duration-200 origin-top-right">
        
        <!-- Account Info Header -->
        <div class="px-5 py-4 border-b border-gray-100 bg-gray-50/50 rounded-t-xl flex items-center gap-3">
            <div class="flex-shrink-0">
                <span class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-base font-bold shadow-sm" *ngIf="!user()?.avatar">
                    {{ initials() }}
                </span>
                <img *ngIf="user()?.avatar" class="w-10 h-10 rounded-full object-cover shadow-sm" [src]="user()?.avatar" alt="">
            </div>
            <div class="flex flex-col overflow-hidden">
                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">{{ tAccount }}</div>
                <div class="text-sm font-semibold text-gray-900 truncate">{{ user()?.name || tUserFallback }}</div>
                <div class="text-xs text-gray-500 truncate">{{ user()?.email }}</div>
            </div>
        </div>
        
        <!-- Actions -->
        <div class="p-2 space-y-0.5">
            <button type="button" 
                    class="w-full text-left px-3 py-2 text-sm font-medium text-gray-700 rounded-lg hover:bg-gray-100 hover:text-gray-900 transition-colors flex items-center gap-3 group" 
                    (click)="goProfile.emit(); close()">
                <lucide-icon [img]="SettingsIcon" class="w-4 h-4 text-gray-400 group-hover:text-gray-600 transition-colors"></lucide-icon>
                {{ tProfileSettings }}
            </button>
            
            <button *ngIf="user()?.isSuperAdmin"
                    type="button"
                    class="w-full text-left px-3 py-2 text-sm font-medium text-indigo-700 rounded-lg hover:bg-indigo-50 transition-colors flex items-center gap-3 group"
                    (click)="goAdmin.emit(); close()">
                <lucide-icon [img]="ShieldIcon" class="w-4 h-4 text-indigo-500 group-hover:text-indigo-600 transition-colors"></lucide-icon>
                {{ tAdminConsole }}
            </button>
            
            <div class="h-px bg-gray-100 my-1"></div>
            
            <button type="button" 
                    class="w-full text-left px-3 py-2 text-sm font-medium text-red-600 rounded-lg hover:bg-red-50 transition-colors flex items-center gap-3 group"
                    (click)="logout.emit(); close()">
                <lucide-icon [img]="LogOutIcon" class="w-4 h-4 text-red-500 group-hover:text-red-600 transition-colors"></lucide-icon>
                {{ tLogout }}
            </button>
        </div>
    </div>
</div>
